name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v7

      - name: Setup Yarn 🧶
        uses: actions/setup-node@v7
        with:
          node-version: '18'
          cache: 'yarn'
          
      - name: Install and Build 🔧
        run: |
          yarn install
          yarn build

      - name: Test 🧪
        run: |
          yarn test --coverage

      - name: Coveralls 👷
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-path: .

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
